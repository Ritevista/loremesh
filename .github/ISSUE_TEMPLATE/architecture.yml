name: Architecture proposal
description: Propose a durable boundary or decision requiring an ADR.
title: "architecture: "
labels: [architecture]
body:
  - type: textarea
    id: context
    attributes:
      label: Context and forces
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options considered
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Dependency, data, security, and compatibility impact
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Proposed decision and consequences
    validations:
      required: true
